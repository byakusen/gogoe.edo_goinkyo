<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江戸のご隠居 〜えどものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#1a1410;       /* 墨 */
    --sumi2:#241c15;
    --kin:#d9a441;        /* 金 */
    --kin-akarui:#f2cd6b;
    --aka:#3a5f7d;        /* 藍（江戸らしい青みに） */
    --aka-fuka:#27435a;
    --washi:#f4ead6;      /* 和紙 */
    --washi-kage:#e7d8ba;
    --midori:#5c7a4a;
    --sumi-usu:rgba(244,234,214,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #2c3a44 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #2a1d12 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のれん風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(39,67,90,.35), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#2c3a44,#1a1410);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(217,164,65,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* ご隠居の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .nobunaga{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#241c15;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  .face .mouth{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{z-index:1;}
  .face .mouth.open{z-index:2;opacity:0;}   /* ふだんは閉じた口。話すとき重ねて見せる */
  .face.talking-open .mouth.open{opacity:1;}
  .face.no-img .mouth{display:none;}
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #2c3a44, #1a1410);
  }
  .face.no-img .face-fallback{display:flex;}
  .face.talk{} /* 話し始めの顔の動きはなし（うなずき・傾きとも無効） */
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(39,67,90,.25);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aka-fuka);font-weight:700;}

  /* 質問エリア */
  .ask-zone{
    background:rgba(36,28,21,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #18303f,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #18303f;}

  /* おすすめ問い */
  .topics{margin-top:8px;}
  .topics .t-label{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);margin:6px 2px 12px;letter-spacing:.08em;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(15px,1.8vw,21px);
    padding:11px 18px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);
    color:var(--washi);
    border:2px solid var(--kin);
    transition:all .15s;
  }
  .chip:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}

  .panel{display:none;}
  .panel.show{display:block;}

  /* 顔のリアクション */
  .face.seikai{box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(217,164,65,.85),0 10px 30px rgba(0,0,0,.5);}

  /* ===== モード切り替えタブ ===== */
  .modebar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:0 0 -2px;}
  .modebtn{
    font-family:'Yuji Syuku',serif;font-size:clamp(14px,1.7vw,20px);
    padding:9px 20px;border-radius:12px 12px 0 0;cursor:pointer;
    border:2px solid var(--kin);border-bottom:none;
    background:rgba(244,234,214,.08);color:var(--washi);letter-spacing:.08em;
    transition:all .15s;
  }
  .modebtn.active{background:var(--kin);color:var(--sumi);}

  /* ===== クイズ ===== */
  .quiz-top{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;}
  .quiz-top select{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(15px,1.8vw,20px);
    padding:10px 14px;border-radius:10px;border:2px solid var(--kin);background:var(--washi);color:var(--sumi);
  }
  .btn-quiz{
    font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.9vw,21px);
    padding:11px 22px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));color:var(--washi);letter-spacing:.06em;
    box-shadow:0 4px 0 #18303f,0 6px 14px rgba(0,0,0,.4);transition:transform .08s;
  }
  .btn-quiz:active{transform:translateY(4px);box-shadow:0 1px 0 #18303f;}
  .score{margin-left:auto;font-family:'Yuji Syuku',serif;color:var(--kin-akarui);
    font-size:clamp(15px,1.8vw,21px);letter-spacing:.06em;}
  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-align:left;
    font-size:clamp(17px,2vw,24px);
    padding:14px 20px;border-radius:12px;cursor:pointer;
    background:var(--washi);color:var(--sumi);border:3px solid transparent;
    transition:all .12s;
  }
  .choice:hover:not(:disabled){border-color:var(--kin);transform:translateY(-2px);}
  .choice:disabled{cursor:default;}
  .choice.correct{background:#cfe3b8;border-color:#5c7a4a;}
  .choice.wrong{background:#e9c4bd;border-color:#7d241c;}
  .quiz-foot{margin-top:16px;display:flex;justify-content:flex-end;}

  /* 浮世絵ギャラリー */
  .gallery-feature{display:none;gap:18px;flex-wrap:wrap;align-items:flex-start;margin-bottom:16px;padding:14px;border:2px solid var(--kin);border-radius:14px;background:rgba(36,28,21,.5);}
  .gal-big{max-width:min(360px,72vw);max-height:360px;width:auto;border-radius:8px;border:3px solid var(--kin);background:#241c15;display:block;}
  .gal-missing{display:flex;align-items:center;justify-content:center;text-align:center;width:min(360px,72vw);min-height:180px;border-radius:8px;border:3px dashed var(--kin);color:var(--kin-akarui);background:repeating-linear-gradient(45deg,#2c2419,#2c2419 10px,#241c15 10px,#241c15 20px);padding:16px;font-weight:700;line-height:1.7;font-size:14px;}
  .gal-info{flex:1;min-width:160px;}
  .gal-title{font-family:'Yuji Syuku',serif;font-size:clamp(18px,2.4vw,26px);color:var(--kin-akarui);margin-bottom:6px;line-height:1.3;}
  .gal-artist{font-size:clamp(15px,1.8vw,20px);color:var(--washi);font-weight:700;}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:12px;margin-top:6px;}
  .gal-card{position:relative;display:flex;flex-direction:column;gap:6px;padding:8px;border:2px solid var(--kin);border-radius:12px;background:rgba(244,234,214,.06);cursor:pointer;transition:transform .12s,background .12s;}
  .gal-card:hover{transform:translateY(-3px);background:rgba(217,164,65,.18);}
  .gal-thumb{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:8px;background:#241c15;display:block;}
  .gal-cap{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(12px,1.4vw,15px);color:var(--washi);text-align:center;line-height:1.3;}
  .gal-card.noimg .gal-thumb{display:none;}
  .gal-card.noimg::before{content:"🖼\A よういして";white-space:pre;display:flex;align-items:center;justify-content:center;text-align:center;width:100%;aspect-ratio:3/4;border-radius:8px;background:repeating-linear-gradient(45deg,#2c2419,#2c2419 8px,#241c15 8px,#241c15 16px);color:var(--kin-akarui);font-size:12px;}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(244,234,214,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .nobunaga{order:-1;}
  }
</style>
</head>
<body>
  <header>
    <div class="mon">
      <span class="mon-maru">江</span>
      <div>
        <h1>江戸のご隠居</h1>
        <div class="sub">えど ものしり もんどう</div>
      </div>
      <span class="mon-maru">戸</span>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="nobunaga">
        <div class="face" id="face">
          <img class="mouth closed" src="https://raw.githubusercontent.com/byakusen/gogoe.edo_goinkyo/main/edojidai.png" alt="江戸のご隠居"
               onerror="this.closest('.face').classList.add('no-img');">
          <img class="mouth open" src="https://raw.githubusercontent.com/byakusen/gogoe.edo_goinkyo/main/edojidai2.png" alt="" aria-hidden="true">
          <span class="face-fallback">ご<br>隠<br>居</span>
        </div>
        <div class="name-tag">ご隠居</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

    <div class="modebar">
      <button class="modebtn active" type="button" data-mode="qa">問答（しつもん）</button>
      <button class="modebtn" type="button" data-mode="quiz">えどクイズ</button>
      <button class="modebtn" type="button" data-mode="gallery">浮世絵ギャラリー</button>
    </div>

    <div class="panel show" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ ご隠居に きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：浮世絵ってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-quiz">
      <div class="ask-zone">
        <div class="label">▼ ご隠居の えどクイズ（三たくから ひとつ えらぶ）</div>
        <div class="quiz-top">
          <select id="quizCat" aria-label="クイズの題えらび"></select>
          <button class="btn-quiz" id="quizStart">クイズを はじめる</button>
          <span class="score" id="score"></span>
        </div>
        <div class="choices" id="choices"></div>
        <div class="quiz-foot">
          <button class="btn-quiz" id="quizNext" style="display:none;">つぎの もんだい ▶</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-gallery">
      <div class="ask-zone">
        <div class="label">▼ 浮世絵ギャラリー（絵をおすと、ご隠居が解説するよ）</div>
        <div class="gallery-feature" id="galFeature"></div>
        <div class="gallery-grid" id="galGrid"></div>
      </div>
    </div>
  </main>

  <footer>クラスで楽しむ 江戸ものしりアプリ／答えは小学生むけにやさしくまとめています</footer>

<script>
// ===== ご隠居の知識（小学4年生むけ・ご隠居口調） =====
// キーワードに当てはまる問いが来たら、その答えを返す。
// 〔1話題＝だいたい10問〕参考：日本語版ウィキペディア各記事
const KB = [
  // ========================================================
  // ■ ご隠居・江戸時代ぜんぱん
  // ========================================================
  {
    keys:["ご隠居","あなたはだれ","きみはだれ","じこしょうかい","自己紹介","だれ","名前","なまえ","何者"],
    a:"わしか？　わしは江戸の町に住む、年よりの「ご隠居」じゃ。商いも子に譲り、いまは気ままに本を読み、町を歩いて暮らしておる。芝居も絵も学問も、ひととおりかじってきての。江戸のことなら、なんでも教えてしんぜよう。さあ、聞きたいことを下のますに書いてみよ。"
  },
  {
    keys:["江戸時代","えどじだい","いつの時代","どんな時代","何年","なんねん"],
    a:"江戸時代とは、徳川家康(とくがわいえやす)が幕府をひらいた1603年から、約260年ものあいだ続いた、いくさのない平和な世のことじゃ。戦国の世が終わり、町人や百姓も腰を落ちつけて暮らせるようになっての。芝居や浮世絵といった町人の文化が、ぱっと花ひらいたのもこの世じゃよ。"
  },
  {
    keys:["徳川家康","とくがわいえやす","家康","しょうぐん","将軍","幕府をひらいた"],
    a:"徳川家康(とくがわいえやす)さまは、1603年に征夷大将軍(せいいたいしょうぐん)となり、江戸に幕府をひらいたお方じゃ。これより徳川家が15代、約260年にわたって世をおさめた。長い平和の世のもとを築いた、たいへんなお人よ。"
  },
  {
    keys:["参勤交代","さんきんこうたい","大名","行き来"],
    a:"参勤交代(さんきんこうたい)とは、諸国の大名が、一年おきに江戸と自分の領地を行き来する決まりのことじゃ。妻子は江戸に住まわせた。多くの家来をつれての長い旅は、たいそうお金がかかっての。大名に力をたくわえさせぬための、幕府のしくみであったのよ。"
  },

  // ========================================================
  // ■ 浮世絵（うきよえ）
  // ========================================================
  {
    keys:["浮世絵","うきよえ","浮世絵ってなに","浮世絵とは"],
    a:"浮世絵(うきよえ)とは、江戸時代に生まれた、町人の暮らしや役者・美人・名所などをえがいた絵のことじゃ。「浮世」とは「当世風(いまふう)」という意味よ。木の板にほって刷る版画(はんが)が多く、安く大量に作れたゆえ、庶民のあいだに広く広まったのじゃ。"
  },
  {
    keys:["菱川師宣","ひしかわもろのぶ","見返り美人","始祖","はじまり","だれが始め"],
    a:"浮世絵の祖(おや)とよばれるのが菱川師宣(ひしかわもろのぶ)じゃ。それまでかざりであった風俗画を、一枚の独り立ちした絵に仕上げた人よ。あの有名な「見返り美人図(みかえりびじん)」をえがいたのも師宣じゃ。ここから江戸の絵が花ひらいていったのよ。"
  },
  {
    keys:["錦絵","にしきえ","多色刷り","たしょくずり","色のついた","カラー","鈴木春信","すずきはるのぶ"],
    a:"はじめの浮世絵は墨一色じゃったが、やがて何色も重ねて刷る、にしきのように美しい絵が生まれた。これを錦絵(にしきえ)という。明和のころ、鈴木春信(すずきはるのぶ)らが広めたのじゃ。ずれぬよう刷る「見当(けんとう)」という工夫があってこそ、できた業よ。"
  },
  {
    keys:["版画","はんが","木版","もくはん","どうやって作","作り方","彫師","摺師","版元"],
    a:"浮世絵の版画は、ひとりで作るのではないぞ。絵をかく絵師(えし)、板にほる彫師(ほりし)、紙に刷る摺師(すりし)、そしてそれをまとめて売る版元(はんもと)――この四者が力を合わせて作るのじゃ。分かれて作るゆえ、たくさん早く、安く作れたのよ。"
  },
  {
    keys:["喜多川歌麿","きたがわうたまろ","美人画","びじんが"],
    a:"美しい女をえがく「美人画(びじんが)」の名手といえば、喜多川歌麿(きたがわうたまろ)じゃ。顔や上半身を大きく描く「大首絵(おおくびえ)」で、女のしぐさや心もちまで見事にうつしとった。江戸の人々は、こぞってその絵を買い求めたものよ。"
  },
  {
    keys:["写楽","東洲斎写楽","とうしゅうさいしゃらく","役者絵","やくしゃえ"],
    a:"役者の顔をいきいきとえがいた「役者絵(やくしゃえ)」で名高いのが、東洲斎写楽(とうしゅうさいしゃらく)じゃ。ほんの十か月ほどのあいだに、すぐれた絵をどっと残して、ふっと消えてしもうた。何者であったか今もって謎の、まことに不思議な絵師よのう。"
  },

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

// ===== タイプライター表示 =====
const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;
let mouthTimer=null;
function startMouth(){
  stopMouth();
  // 口を開いた絵と閉じた絵をすばやく切り替えて「ぱくぱく」させる
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open'); // 話し終わりは口を閉じた絵にもどす
}
function speak(text, mood){
  faceEl.classList.remove('talk','seikai','zannen'); void faceEl.offsetWidth;
  faceEl.classList.add(mood || 'talk');
  startMouth();
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); stopMouth(); return;}
    answerEl.appendChild(document.createTextNode(text[i]));
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

const qEl=document.getElementById('q');

// IME（日本語入力）の変換確定中かどうかを記録する
let composing=false;
qEl.addEventListener('compositionstart',()=>{ composing=true; });
qEl.addEventListener('compositionend',()=>{ composing=false; });

document.getElementById('askBtn').onclick=()=>handleAsk(qEl.value);
qEl.addEventListener('keydown',e=>{
  // 漢字変換などの確定リターンでは送信しない。
  // 変換が確定し、ふつうにリターンを押したときだけ質問を送る。
  if(e.key==='Enter' && !composing && !e.isComposing){
    handleAsk(qEl.value);
  }
});

// ===== クイズの動き =====
const choicesEl=document.getElementById('choices');
const nextBtn=document.getElementById('quizNext');
const scoreEl=document.getElementById('score');
const quizCatEl=document.getElementById('quizCat');
const QTOPICS=["浮世絵","文楽","近松門左衛門","井原西鶴","歌舞伎","歌川広重","杉田玄白","前野良沢","蘭学","伊能忠敬","本居宣長","寺子屋","儒教","藩校","天下の台所","江戸"];
quizCatEl.innerHTML='<option value="">ぜんぶ（ランダム）</option>'+QTOPICS.map(t=>'<option value="'+t+'">'+t+'</option>').join('');

let qpool=[], qi=0, qscore=0, qtotal=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function updateScore(){ scoreEl.textContent = qtotal ? ('正解 '+qscore+' / '+qtotal) : ''; }

function startQuiz(){
  const cat=quizCatEl.value;
  qpool=shuffle(QUIZ.filter(x=>!cat||x.t===cat).slice());
  qi=0;qscore=0;qtotal=0;updateScore();
  if(!qpool.length){ speak("はて、その題のクイズは、まだ持ちあわせておらぬ。"); return; }
  nextQuestion();
}
function nextQuestion(){
  nextBtn.style.display='none';
  faceEl.classList.remove('seikai');
  if(qi>=qpool.length){ finishQuiz(); return; }
  const item=qpool[qi];
  speak("【第"+(qi+1)+"問・"+item.t+"】　"+item.q);
  const opts=item.c.map((text,idx)=>({text,correct:idx===item.a}));
  shuffle(opts);
  choicesEl.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='choice'; b.type='button'; b.textContent=o.text;
    b.onclick=()=>answer(b,o,item);
    choicesEl.appendChild(b);
  });
}
function answer(btn,o,item){
  [...choicesEl.children].forEach(c=>c.disabled=true);
  qtotal++;
  if(o.correct){
    btn.classList.add('correct'); qscore++;
    speak("おお、せいかい！　"+item.n, 'seikai');
  }else{
    btn.classList.add('wrong');
    [...choicesEl.children].forEach(c=>{ if(c.textContent===item.c[item.a]) c.classList.add('correct'); });
    speak("おしいのう、ちがうぞ。こたえは「"+item.c[item.a]+"」じゃ。"+item.n);
  }
  updateScore();
  qi++;
  nextBtn.textContent = (qi>=qpool.length) ? "けっかを みる ▶" : "つぎの もんだい ▶";
  nextBtn.style.display='';
}
function finishQuiz(){
  choicesEl.innerHTML=""; nextBtn.style.display='none';
  const r = qtotal ? qscore/qtotal : 0;
  let msg;
  if(r===1) msg="すべて正解とは、あっぱれ！　りっぱな江戸はかせじゃ。";
  else if(r>=0.7) msg="なかなかの出来じゃ。よう学んでおるのう。";
  else if(r>=0.4) msg="まずまずじゃ。もう一度ためせば、きっと伸びるぞ。";
  else msg="これからじゃ。問答でも学んで、また挑むがよい。";
  speak("クイズ、おわり！　"+qtotal+"問のうち、"+qscore+"問せいかいじゃ。"+msg);
  updateScore();
}
document.getElementById('quizStart').onclick=startQuiz;
nextBtn.onclick=nextQuestion;

const galGrid=document.getElementById('galGrid');
const galFeature=document.getElementById('galFeature');
let galleryRendered=false;
function renderGallery(){
  if(galleryRendered) return;
  galleryRendered=true;
  galGrid.innerHTML="";
  GALLERY.forEach((w,idx)=>{
    const card=document.createElement('button');
    card.className='gal-card'; card.type='button';
    const img=document.createElement('img');
    img.className='gal-thumb'; img.src=GAL_BASE+w.file; img.alt=w.title; img.loading='lazy';
    img.onerror=()=>{ card.classList.add('noimg'); };
    const cap=document.createElement('span'); cap.className='gal-cap'; cap.textContent=w.title;
    card.appendChild(img); card.appendChild(cap);
    card.onclick=()=>showWork(idx);
    galGrid.appendChild(card);
  });
}
function showWork(idx){
  const w=GALLERY[idx];
  galFeature.innerHTML="";
  const big=document.createElement('img');
  big.className='gal-big'; big.src=GAL_BASE+w.file; big.alt=w.title;
  big.onerror=()=>{
    const ph=document.createElement('div');
    ph.className='gal-missing';
    ph.textContent="（この絵の画像は、まだ よういされておらぬ）\nファイル名： "+w.file;
    ph.style.whiteSpace='pre-line';
    if(big.parentNode) big.parentNode.replaceChild(ph,big);
  };
  const info=document.createElement('div'); info.className='gal-info';
  const t=document.createElement('div'); t.className='gal-title'; t.textContent=w.title;
  const a=document.createElement('div'); a.className='gal-artist'; a.textContent=w.artist;
  info.appendChild(t); info.appendChild(a);
  galFeature.appendChild(big); galFeature.appendChild(info);
  galFeature.style.display='flex';
  speak("【"+w.title+"】　"+w.n);
}

    }else{
      speak("なんでも きいておくれ。下のますに しつもんを書いて、リターンか「きく」をおすのじゃ。");

});
